# Nginx Load Balancer + Reverse Proxy Config
# Dipasang di Droplet-1 SAJA sebagai /etc/nginx/sites-available/app
# Aktifkan dengan: sudo ln -s /etc/nginx/sites-available/app /etc/nginx/sites-enabled/

upstream flask_backend {
    # Round-robin equal ke Droplet-1 (loopback) dan Droplet-2 (private IP)
    # Ganti IP_INTERNAL_DROPLET2 dengan private IP Droplet-2
    # (lihat di DO Console → Droplet → Networking → Private IP)
    server 127.0.0.1:5000;          # Droplet-1: loopback
    server IP_INTERNAL_DROPLET2:5000; # Droplet-2: private IP dari VPC
    # Tidak ada weight — kedua Droplet spek sama (2vCPU/4GB), distribusi equal
}

server {
    listen 80;
    server_name _;  # Terima semua hostname / IP

    # Batas ukuran request body (untuk order dengan banyak item)
    client_max_body_size 10M;

    # Gzip compression — kurangi bandwidth, percepat response
    gzip on;
    gzip_types application/json text/plain;
    gzip_min_length 1024;

    location / {
        proxy_pass http://flask_backend;

        # Header penting agar Flask tahu IP asli client
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout — sesuaikan dengan Gunicorn timeout (30s)
        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Nonaktifkan buffering untuk streaming response
        proxy_buffering off;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://flask_backend;
        access_log off;  # Jangan log health checks, berisik
    }
}
